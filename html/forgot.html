<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <style>
    * {
      -webkit-tap-highlight-color: transparent;
      text-decoration: none;
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: url('https://static.vecteezy.com/system/resources/thumbnails/032/481/150/small_2x/game-2d-platformer-background-in-cartoon-style-generate-ai-photo.jpg') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    
    .forgot-container {
      background: rgba(255, 255, 255, 0.9);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      width: min(380px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .forgot-container input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    
    .btn {
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #ff7eb3, #ff758c, #ff6a88);
      transition: transform 0.2s ease;
    }
    
    .btn:hover {
      transform: scale(1.05);
    }
    
    .btn:active {
      transform: scale(0.95) !important;
      color: rgba(255, 255, 255, 0.25) !important;
    }
    
    .back-link {
      margin-top: 10px;
      font-size: 13px;
      color: #2575fc;
      text-decoration: none;
    }
    
    .back-link:hover {
      text-decoration: underline;
    }
    
    #f-email,
    #f-pass,
    #f-cpass {
      display: none;
      font-size: 0.75rem;
      color: red;
    }
    
    @keyframes shake {
      0% {
        transform: translateX(0.5rem);
      }
      
      50% {
        transform: translateX(-0.5rem);
      }
      
      100% {
        transform: translateX(0.5rem);
      }
    }
    
    .shakeme {
      animation: shake 0.1s linear 3;
    }
  </style>
</head>

<body>
  <div class="forgot-container">
    <h2>Reset Password</h2>
    <input class="f-input" type="email" id="email" placeholder="Email" required>
    <p id="f-email">*incorrect email*</p>
    <input class="f-input" type="password" id="newPassword" placeholder="New Password" required pattern="^[A-Za-z\\d]{6,12}$" title="Password must be 6-12 characters long">
    <p id="f-pass">*incorrect password*</p>
    <input class="f-input" class="f-input" type="password" id="confirmNewPassword" placeholder="Confirm New Password" required>
    <p id="f-cpass">*incorrect correct password*</p>
    <button id="btnResetPass" class="btn">Reset Password</button>
    <button id="btnReturn" class="btn">Back to Login</button>
  </div>
  
  <script type="module" src="../javascript/forgot.js"></script>
</body>

</html>
